<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Averages — Kno U Kno</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <header>
        <div class="wrap">
            <nav>
                <div class="brand"><a href="/index.html" style="color:inherit">Kno U Kno</a></div>
                <div class="nav-links">
                    <a href="/login.html">Login</a>
                    <a href="/register.html">Register (Recovery Password)</a>
                    <a href="/paidme/pay.html">Pay</a>
                    <a href="/about.html">About</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="wrap">
        <div class="card" style="margin:24px 0">
            <h1 style="font-size:28px;margin:.2em 0 .6em">Average Ratings</h1>
            <p class="notice">Showing per-question averages (1–5). Only answers with a rating are included.</p>
            <table class="table" id="t">
                <thead>
                    <tr>
                        <th>Question #</th>
                        <th>Count</th>
                        <th>Avg Rating</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <p class="small" id="overall"></p>
        </div>
    </main>

    <footer>© <span id="y"></span> Kno U Kno</footer>
    <script>
        document.getElementById('y').textContent = new Date().getFullYear();
        const API_BASE = (location.port === '5001') ? '' : 'http://127.0.0.1:5001';
        async function load() {
            const res = await fetch(API_BASE + '/api/stats');
            const data = await res.json();
            const tb = document.querySelector('#t tbody');
            tb.innerHTML = '';
            for (const row of (data.per_question || [])) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td>' + row.question_id + '</td><td>' + row.count + '</td><td>' + (row.avg_rating ?? '') + '</td>';
                tb.appendChild(tr);
            }
            const o = data.overall || {};
            document.getElementById('overall').textContent = 'Overall: ' + (o.count || 0) + ' ratings, avg ' + (o.avg_rating ?? '—');
        }
        load();
    </script>
</body>

</html>
