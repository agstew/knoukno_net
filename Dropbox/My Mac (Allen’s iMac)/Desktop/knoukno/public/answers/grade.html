<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grade Answers — Kno U Kno</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .row{margin:12px 0}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .pager{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pager input{width:4rem}
</style>
</head><body>
<header><div class="wrap"><nav>
  <div class="brand"><a href="/index.html" style="color:inherit">Kno U Kno</a></div>
  <div class="nav-links">
    <a href="/login.html">Login</a><a href="/register.html">Register (Recovery Password)</a>
    <a href="/paidme/pay.html">Pay</a><a href="/about.html">About</a>
  </div>
</nav></div></header>

<main class="wrap">
  <div class="card" style="margin:24px 0">
    <h1 style="font-size:28px;margin:.2em 0 .6em">Grade your answers</h1>
    <p class="notice">This page loads questions from the database with pagination. Rate each 1–5 and add one next step, then save.</p>
    <div class="actions" style="margin-top:8px">
      <div class="pager">
        <button class="btn" id="prev">Prev</button>
        <span id="pp">Page</span>
        <input id="pg" value="1" aria-label="Page number">
        <span id="tp">of</span> <span id="totalp">1</span>
        <button class="btn" id="next">Next</button>
        <select id="ps">
          <option>10</option><option>20</option><option>50</option>
        </select>
      </div>
      <button class="btn" id="saveAll">Save All (page)</button>
      <span id="msg" class="notice"></span>
    </div>
  </div>

  <div id="list"></div>
</main>

<footer>© <span id="y"></span> Kno U Kno</footer>
<script>
document.getElementById('y').textContent = new Date().getFullYear();
var API_BASE = (location.port === '5001') ? '' : 'http://127.0.0.1:5001';
var STORE = 'kunk_grade_buf_v2';
var page = 1, pageSize = 10, total = 0, totalPages = 1;
var items = []; // current page questions [{id,text},...]

function loadBuf(){ try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(_){return{}} }
function saveBuf(x){ localStorage.setItem(STORE, JSON.stringify(x)) }

function esc(s){ return (s||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]}) }

function rowHTML(q){
  var id = 'q'+q.id;
  return '<div class="card row">'+
    '<div><strong>Q'+q.id+'.</strong> '+esc(q.text)+'</div>'+
    '<div class="form-row" style="margin-top:8px">'+
      '<div><label for="'+id+'-rating">Rating (1–5)</label>'+
      '<select id="'+id+'-rating"><option value="">—</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>'+
      '<div><label for="'+id+'-text">Next step</label>'+
      '<input id="'+id+'-text" placeholder="Write one concrete next step…"/></div>'+
    '</div>'+
    '<div class="actions" style="margin-top:8px"><button class="btn" onclick="saveOne('+q.id+')">Save row</button>'+
    '<span id="'+id+'-status" class="notice"></span></div>'+
  '</div>';
}

function render(){
  var list = document.getElementById('list');
  list.innerHTML = items.map(rowHTML).join('');
  var buf = loadBuf();
  items.forEach(function(q){
    var id='q'+q.id, r=buf[id]||{};
    var sel=document.getElementById(id+'-rating');
    var inp=document.getElementById(id+'-text');
    if (r.rating!=null && r.rating!=='') sel.value = r.rating;
    if (r.text) inp.value = r.text;
    sel.addEventListener('change', function(e){
      var b=loadBuf(); b[id]=b[id]||{}; b[id].rating = e.target.value||''; saveBuf(b);
    });
    inp.addEventListener('input', function(e){
      var b=loadBuf(); b[id]=b[id]||{}; b[id].text = e.target.value; saveBuf(b);
    });
  });
  document.getElementById('pg').value = String(page);
  document.getElementById('totalp').textContent = String(totalPages);
}

function setMsg(m){ document.getElementById('msg').textContent = m||''; }

function buildURL(){
  return API_BASE + '/api/questions?page=' + page + '&page_size=' + pageSize;
}

async function loadPage(){
  setMsg('Loading…');
  try{
    var res = await fetch(buildURL());
    var data = await res.json();
    items = data.items||[];
    total = data.total||0;
    totalPages = data.total_pages||1;
    render();
    setMsg('');
  }catch(e){ setMsg('Error: '+e.message); }
}

async function postAnswer(question_id, rating, text){
  var res = await fetch(API_BASE + '/api/answers', {
    method:'POST', headers:{'Content-Type':'application/json'},
    credentials:'include', body: JSON.stringify({ user:null, question_id:question_id, rating:rating, text:text })
  });
  if(!res.ok){ throw new Error(await res.text()||res.statusText); }
}

async function saveOne(qid){
  var id='q'+qid, msg=document.getElementById(id+'-status');
  var rating = document.getElementById(id+'-rating').value || null;
  var text = document.getElementById(id+'-text').value.trim() || null;
  msg.textContent='Saving…';
  try{
    await postAnswer(qid, rating?Number(rating):null, text);
    msg.textContent='Saved.';
  }catch(e){ msg.textContent='Error: '+e.message; }
}

document.getElementById('saveAll').addEventListener('click', async function(){
  setMsg('Saving all…');
  try{
    for(var i=0;i<items.length;i++){
      var q=items[i], id='q'+q.id;
      var r=document.getElementById(id+'-rating').value||null;
      var t=document.getElementById(id+'-text').value.trim()||null;
      await postAnswer(q.id, r?Number(r):null, t);
      document.getElementById(id+'-status').textContent='Saved.';
    }
    setMsg('All saved.');
  }catch(e){ setMsg('Error: '+e.message); }
});

document.getElementById('prev').addEventListener('click', function(){ if(page>1){ page--; loadPage(); } });
document.getElementById('next').addEventListener('click', function(){ if(page<totalPages){ page++; loadPage(); } });
document.getElementById('pg').addEventListener('change', function(){ var v=parseInt(this.value,10)||1; if(v<1)v=1; if(v>totalPages)v=totalPages; page=v; loadPage(); });
document.getElementById('ps').addEventListener('change', function(){ pageSize=parseInt(this.value,10)||10; page=1; loadPage(); });
loadPage();
</script>
</body></html>
