<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rate Answers — Kno U Kno</title>
<link rel="stylesheet" href="/styles.css">
<style>.btns{display:flex;gap:8px;flex-wrap:wrap}.kbd{background:#1f2129;border:1px solid #2a2d37;border-radius:6px;padding:2px 6px;font-size:12px;color:#b6b9c3}</style>
</head><body>
<header><div class="wrap"><nav>
  <div class="brand"><a href="/index.html" style="color:inherit">Kno U Kno</a></div>
  <div class="nav-links">
    <a href="/login.html">Login</a><a href="/register.html">Register (Recovery Password)</a>
    <a href="/paidme/pay.html">Pay</a><a href="/about.html">About</a>
  </div>
</nav></div></header>

<main class="wrap">
  <div class="card" style="margin:24px 0">
    <h1 style="font-size:28px;margin:.2em 0 .6em">Quick rate</h1>
    <p class="notice">Use keys <span class="kbd">1</span>–<span class="kbd">5</span> to rate. Add an optional note. “Save & Next” moves forward.</p>
  </div>

  <div class="card" id="pane">
    <div id="q" style="font-weight:700;margin-bottom:6px"></div>
    <div class="btns" style="margin:8px 0 12px">
      <button class="btn" onclick="rate(1)">1</button>
      <button class="btn" onclick="rate(2)">2</button>
      <button class="btn" onclick="rate(3)">3</button>
      <button class="btn" onclick="rate(4)">4</button>
      <button class="btn" onclick="rate(5)">5</button>
    </div>
    <label for="note">Note (optional)</label>
    <input id="note" placeholder="Your next step…">
    <div class="btns" style="margin-top:12px">
      <button class="btn" onclick="saveNext()">Save & Next</button>
      <button class="btn" onclick="prev()">Prev</button>
      <button class="btn" onclick="next()">Next</button>
      <span id="msg" class="notice"></span>
    </div>
    <p class="small" id="progress" style="margin-top:8px"></p>
  </div>
</main>

<footer>© <span id="y"></span> Kno U Kno</footer>
<script>
document.getElementById('y').textContent = new Date().getFullYear();
var API_BASE = (location.port === '5001') ? '' : 'http://127.0.0.1:5001';
var total = 50; // fallback
var curr = Number(localStorage.getItem('kunk_rate_idx')||'1'); // 1-based id
if (curr < 1) curr = 1;

async function initTotal(){
  try{
    var res = await fetch(API_BASE + '/api/questions?page=1&page_size=1');
    var data = await res.json();
    if (data && typeof data.total === 'number') total = data.total || total;
  }catch(_){}
}
function esc(s){ return (s||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]}) }
async function loadQ(){
  var res = await fetch(API_BASE + '/api/questions/' + curr);
  if (res.status === 404){ document.getElementById('q').textContent='Not found'; return; }
  var q = await res.json();
  document.getElementById('q').textContent = 'Q'+q.id+'. ' + esc(q.text);
  document.getElementById('note').value = '';
  document.getElementById('msg').textContent = '';
  document.getElementById('progress').textContent = 'Question '+q.id+' of '+total;
}
function next(){ if (curr < total){ curr++; localStorage.setItem('kunk_rate_idx', String(curr)); loadQ(); } }
function prev(){ if (curr > 1){ curr--; localStorage.setItem('kunk_rate_idx', String(curr)); loadQ(); } }
var lastRating = null;
function rate(n){ lastRating = n; document.getElementById('msg').textContent = 'Rating: '+n; }
async function saveNext(){
  var msg = document.getElementById('msg');
  if(!lastRating){ msg.textContent='Choose a rating 1–5'; return; }
  msg.textContent='Saving…';
  try{
    var body = { user:null, question_id: curr, rating: lastRating, text: (document.getElementById('note').value||'').trim()||null };
    var res = await fetch(API_BASE + '/api/answers', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify(body) });
    if(!res.ok){ throw new Error(await res.text()||res.statusText); }
    msg.textContent='Saved.'; setTimeout(function(){ next(); }, 150);
  }catch(e){ msg.textContent='Error: '+e.message; }
}
document.addEventListener('keydown', function(e){
  if(e.key>='1' && e.key<='5'){ rate(Number(e.key)); }
  if(e.key==='ArrowRight'){ saveNext(); }
  if(e.key==='ArrowLeft'){ prev(); }
});
initTotal().then(loadQ);
</script>
</body></html>
