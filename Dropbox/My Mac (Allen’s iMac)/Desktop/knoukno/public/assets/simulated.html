<!doctype html><meta charset="utf-8">
<title>Simulated Checkout — Kno U Kno</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#0b0c10;color:#e6e6e6}
  .wrap{max-width:720px;margin:40px auto;padding:0 16px}
  .card{background:#111420;border:1px solid #1f2230;border-radius:16px;padding:20px}
  a.btn{display:inline-block;margin-top:12px;background:#22c55e;color:#062;text-decoration:none;padding:.7rem 1rem;border-radius:10px;font-weight:700}
</style>
<div class="wrap">
  <div class="card">
    <h1>Simulated Checkout</h1>
    <p id="info"></p>
    <a class="btn" href="/">Return Home</a>
  </div>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const plan = p.get('plan') || 'n/a';
  const billing = p.get('billing') || 'once';
  document.getElementById('info').textContent =
    `You would be redirected to Stripe for plan "${plan}" (${billing}). Configure STRIPE_SECRET_KEY to go live.`;
</script>
