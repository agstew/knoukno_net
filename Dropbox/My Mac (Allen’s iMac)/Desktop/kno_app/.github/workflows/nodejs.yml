name: Node.js CI

on:
  push:
    branches: [ main, master, "dev/*", "dev/add-dev-scripts" ]
  pull_request:
    branches: [ agstew-knoukno ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test --silent
