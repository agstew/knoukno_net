name: CI

on:
  push:
    branches: [ main, master, "feature/**", "*/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd backend
          npm ci
      - name: Run tests (with coverage)
        run: |
          cd backend
          npm run coverage
      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Skip Codecov upload (no token)
        if: ${{ secrets.CODECOV_TOKEN == '' }}
        run: |
          echo "CODECOV_TOKEN not set; skipping coverage upload"

      - name: Run webhook smoke-test
        if: ${{ secrets.WEBHOOK_TEST_URL && secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          cd backend
          node scripts/send_signed_webhook.js --secret=${{ secrets.STRIPE_WEBHOOK_SECRET }} --url=${{ secrets.WEBHOOK_TEST_URL }} --send
        env:
          NODE_OPTIONS: --unhandled-rejections=strict

      - name: Skip webhook smoke-test (no webhook secrets)
        if: ${{ !secrets.WEBHOOK_TEST_URL || !secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          echo "WEBHOOK_TEST_URL or STRIPE_WEBHOOK_SECRET missing; skipping webhook smoke-test"
