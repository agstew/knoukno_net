name: Verify admin links (dry-run)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  verify-admin:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand(\"ping\")'" 
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server
        working-directory: backend
        env:
          DEV_HTTPS: 'true'
          PORT: '3000'
          MONGO_URL: 'mongodb://localhost:27017/kno_ci'
        run: |
          node server.js &> server.log & echo $! > server.pid
          # wait for backend to accept connections
          for i in $(seq 1 30); do
            if curl -ksS https://localhost:3000/ -o /dev/null; then
              echo "backend up"; break
            fi
            sleep 1
          done

      - name: Run verifier (dry-run)
        env:
          EXECUTE: '0'
          PRESERVE_TMP: '1'
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          bash backend/scripts/verify_admin_links.sh

      - name: Collect TMPDIR
        id: collect-tmpdir
        run: |
          TMPDIR=$(find /tmp -type f -name post_results.txt -print0 2>/dev/null | xargs -0 -I{} dirname {} | xargs ls -1td 2>/dev/null | head -1 || true)
          if [ -z "$TMPDIR" ]; then
            echo "TMPDIR=" >> $GITHUB_OUTPUT
          else
            echo "TMPDIR=$TMPDIR" >> $GITHUB_OUTPUT
          fi

      - name: Upload verifier artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verifier-artifacts
          path: |
            ${{ steps.collect-tmpdir.outputs.TMPDIR }}
            backend/scripts/archive/**
